version: 2

before:
  hooks:
    - go mod tidy
    - go test .

builds:
  - id: linux
    binary: capsblink
    goos: [linux]
    goarch: [amd64, "386", arm64, arm]
    env: [CGO_ENABLED=0]

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

